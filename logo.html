<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novu Studios — 3 Versions</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oxanium:wght@200;400;800&family=Familjen+Grotesk:wght@400;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080808;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 64px 40px 80px;
  gap: 0;
}

/* ─── SHARED ─── */
.version-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  opacity: 0;
  animation: up 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
}
.v-num {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #222;
  letter-spacing: 0.2em;
}
.v-line { height: 1px; width: 48px; background: #1e1e1e; }
.v-name {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #2e2e2e;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.spacer { height: 56px; }

@keyframes up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}


/* ═══════════════════════════════════
   VERSION 1 — SPLIT / NEGATIVE SPACE
═══════════════════════════════════ */

.card-1 {
  width: 640px;
  height: 280px;
  background: #0d0d0d;
  border: 1px solid #161616;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: up 0.9s cubic-bezier(0.16,1,0.3,1) 0.15s forwards;
}

/* Diagonal slice */
.card-1::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 52%;
  height: 100%;
  background: #111;
  clip-path: polygon(12% 0, 100% 0, 100% 100%, 0% 100%);
}

/* Lime slice edge */
.card-1::after {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  width: 3px;
  height: 100%;
  background: #c8ff00;
  transform: translateX(-50%) skewX(-6deg);
  box-shadow: 0 0 18px #c8ff00, 0 0 40px rgba(200,255,0,0.3);
}

.v1-inner {
  display: flex;
  align-items: center;
  gap: 0;
  position: relative;
  z-index: 2;
}

.v1-left {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding-right: 28px;
}

.v1-novu {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 96px;
  color: #f0ede6;
  letter-spacing: 0.05em;
  line-height: 1;
}

.v1-right {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-left: 28px;
}

.v1-studios {
  font-family: 'Familjen Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: #c8ff00;
}

.v1-sub {
  font-family: 'Familjen Grotesk', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.2em;
  color: #2e2e2e;
  text-transform: uppercase;
}

/* Corner coords */
.coord {
  position: absolute;
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  color: #1c1c1c;
  letter-spacing: 0.1em;
}
.coord-tl { top: 14px; left: 16px; }
.coord-br { bottom: 14px; right: 16px; }


/* ═══════════════════════════════════
   VERSION 2 — STACKED BOLD
═══════════════════════════════════ */

.card-2 {
  width: 640px;
  height: 280px;
  background: #c8ff00;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: up 0.9s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
}

/* Big ghost N watermark */
.card-2::before {
  content: 'N';
  position: absolute;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 420px;
  color: rgba(0,0,0,0.06);
  line-height: 1;
  top: 50%;
  left: 50%;
  transform: translate(-42%, -50%);
  pointer-events: none;
  user-select: none;
}

.v2-inner {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  position: relative;
  z-index: 2;
  gap: 0;
}

.v2-tag {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(0,0,0,0.4);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.v2-novu {
  font-family: 'Oxanium', sans-serif;
  font-weight: 800;
  font-size: 100px;
  color: #080808;
  letter-spacing: -0.03em;
  line-height: 0.88;
}

.v2-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 10px;
  width: 100%;
}

.v2-bar {
  flex: 1;
  height: 2px;
  background: #080808;
  opacity: 0.2;
}

.v2-studios {
  font-family: 'Familjen Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: #080808;
  opacity: 0.55;
}


/* ═══════════════════════════════════
   VERSION 3 — MINIMAL CIRCLE MARK
═══════════════════════════════════ */

.card-3 {
  width: 640px;
  height: 280px;
  background: #0d0d0d;
  border: 1px solid #161616;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 36px;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: up 0.9s cubic-bezier(0.16,1,0.3,1) 0.45s forwards;
}

/* Subtle background grid */
.card-3::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 40px 40px;
}

.v3-mark {
  position: relative;
  width: 110px;
  height: 110px;
  flex-shrink: 0;
}

.v3-mark svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

/* Spinning dashed ring */
.v3-ring {
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 1px dashed rgba(200,255,0,0.2);
  animation: spin 20s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.v3-ring-dot {
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #c8ff00;
  box-shadow: 0 0 8px #c8ff00;
}

.v3-text {
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  z-index: 2;
}

.v3-novu {
  font-family: 'Oxanium', sans-serif;
  font-weight: 800;
  font-size: 68px;
  color: #f0ede6;
  letter-spacing: 0.04em;
  line-height: 1;
}

.v3-studios-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.v3-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #c8ff00;
  box-shadow: 0 0 8px #c8ff00;
  flex-shrink: 0;
}

.v3-studios {
  font-family: 'Familjen Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  color: #3a3a3a;
}

/* SVG draw animation */
.draw-stroke {
  stroke-dasharray: 350;
  stroke-dashoffset: 350;
  animation: draw 1.2s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
}
.draw-stroke-2 {
  stroke-dasharray: 350;
  stroke-dashoffset: 350;
  animation: draw 1.2s cubic-bezier(0.16,1,0.3,1) 1s forwards;
}
.draw-fill {
  opacity: 0;
  animation: fadeIn 0.5s ease 1.4s forwards;
}
@keyframes draw { to { stroke-dashoffset: 0; } }
@keyframes fadeIn { to { opacity: 1; } }

</style>
</head>
<body>

  <!-- V1 LABEL -->
  <div class="version-row" style="animation-delay:0.05s">
    <span class="v-num">01</span>
    <div class="v-line"></div>
    <span class="v-name">Split Edge — Dark &amp; Electric</span>
  </div>

  <!-- VERSION 1 -->
  <div class="card-1">
    <span class="coord coord-tl">33.8891° N</span>
    <span class="coord coord-br">35.4944° E</span>

    <div class="v1-inner">
      <div class="v1-left">
        <div class="v1-novu">NOVU</div>
      </div>
      <div class="v1-right">
        <span class="v1-studios">Studios</span>
        <span class="v1-sub">Web Design</span>
        <span class="v1-sub">Digital Identity</span>
      </div>
    </div>
  </div>

  <div class="spacer"></div>

  <!-- V2 LABEL -->
  <div class="version-row" style="animation-delay:0.25s">
    <span class="v-num">02</span>
    <div class="v-line"></div>
    <span class="v-name">Inverse Bold — High Impact</span>
  </div>

  <!-- VERSION 2 -->
  <div class="card-2">
    <div class="v2-inner">
      <span class="v2-tag">// Web Studio</span>
      <div class="v2-novu">NOVU</div>
      <div class="v2-row">
        <div class="v2-bar"></div>
        <span class="v2-studios">Studios</span>
        <div class="v2-bar"></div>
      </div>
    </div>
  </div>

  <div class="spacer"></div>

  <!-- V3 LABEL -->
  <div class="version-row" style="animation-delay:0.4s">
    <span class="v-num">03</span>
    <div class="v-line"></div>
    <span class="v-name">Orbital Mark — Clean &amp; Iconic</span>
  </div>

  <!-- VERSION 3 -->
  <div class="card-3">

    <!-- Animated icon mark -->
    <div class="v3-mark">
      <div class="v3-ring">
        <div class="v3-ring-dot"></div>
      </div>

      <svg viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Background circle -->
        <circle cx="55" cy="55" r="52" fill="#111" stroke="#1e1e1e" stroke-width="1"/>

        <!-- N left bar -->
        <rect class="draw-fill" x="27" y="26" width="14" height="58" rx="2" fill="#f0ede6"/>
        <!-- N right bar -->
        <rect class="draw-fill" x="69" y="26" width="14" height="58" rx="2" fill="#f0ede6"/>

        <!-- N diagonal — animated draw -->
        <line
          class="draw-stroke"
          x1="41" y1="26"
          x2="69" y2="84"
          stroke="#c8ff00"
          stroke-width="12"
          stroke-linecap="round"
        />

        <!-- Small tick at top right of circle -->
        <circle class="draw-fill" cx="87" cy="22" r="4" fill="#c8ff00" opacity="0.85"/>
      </svg>
    </div>

    <!-- Text -->
    <div class="v3-text">
      <div class="v3-novu">NOVU</div>
      <div class="v3-studios-row">
        <div class="v3-dot"></div>
        <span class="v3-studios">Studios</span>
      </div>
    </div>

  </div>

</body>
</html>
