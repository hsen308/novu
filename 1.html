<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novu Studios</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --lime: #c8ff00;
        --dark: #080808;
        --mid: #111;
        --offwhite: #eeeade;
      }

      body {
        background: var(--dark);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "DM Sans", sans-serif;
        overflow: hidden;
        position: relative;
      }

      /* Grain overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 100;
        opacity: 0.4;
      }

      /* Ambient glow */
      .glow-blob {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(200, 255, 0, 0.07) 0%,
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        animation: pulse-glow 4s ease-in-out infinite;
      }

      @keyframes pulse-glow {
        0%,
        100% {
          opacity: 0.6;
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.1);
        }
      }

      /* Main logo container */
      .logo-wrap {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        opacity: 0;
        animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* The big N letterform */
      .n-mark {
        position: relative;
        width: 220px;
        height: 220px;
      }

      .n-mark svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      /* Rotating orbit ring */
      .orbit {
        position: absolute;
        inset: -18px;
        border-radius: 50%;
        border: 1px solid rgba(200, 255, 0, 0.15);
        animation: spin 12s linear infinite;
      }

      .orbit::before {
        content: "";
        position: absolute;
        width: 8px;
        height: 8px;
        background: var(--lime);
        border-radius: 50%;
        top: -4px;
        left: 50%;
        transform: translateX(-50%);
        box-shadow:
          0 0 12px var(--lime),
          0 0 24px var(--lime);
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Corner tick marks */
      .tick {
        position: absolute;
        width: 14px;
        height: 14px;
        opacity: 0.4;
      }
      .tick-tl {
        top: 0;
        left: 0;
        border-top: 1.5px solid var(--lime);
        border-left: 1.5px solid var(--lime);
      }
      .tick-tr {
        top: 0;
        right: 0;
        border-top: 1.5px solid var(--lime);
        border-right: 1.5px solid var(--lime);
      }
      .tick-bl {
        bottom: 0;
        left: 0;
        border-bottom: 1.5px solid var(--lime);
        border-left: 1.5px solid var(--lime);
      }
      .tick-br {
        bottom: 0;
        right: 0;
        border-bottom: 1.5px solid var(--lime);
        border-right: 1.5px solid var(--lime);
      }

      /* Wordmark row */
      .wordmark-row {
        display: flex;
        align-items: baseline;
        gap: 0;
        margin-top: -8px;
        position: relative;
      }

      .word-novu {
        font-family: "Bebas Neue", sans-serif;
        font-size: 88px;
        color: var(--offwhite);
        letter-spacing: 0.08em;
        line-height: 1;
        position: relative;
      }

      /* Glitch effect on hover */
      .word-novu::before,
      .word-novu::after {
        content: "NOVU";
        position: absolute;
        top: 0;
        left: 0;
        font-family: "Bebas Neue", sans-serif;
        font-size: 88px;
        letter-spacing: 0.08em;
        opacity: 0;
        transition: opacity 0.1s;
      }

      .wordmark-row:hover .word-novu::before {
        color: var(--lime);
        opacity: 0.5;
        clip-path: polygon(0 20%, 100% 20%, 100% 45%, 0 45%);
        transform: translate(-3px, 0);
        animation: glitch-top 0.4s steps(2) forwards;
      }

      .wordmark-row:hover .word-novu::after {
        color: #ff4ecd;
        opacity: 0.4;
        clip-path: polygon(0 55%, 100% 55%, 100% 80%, 0 80%);
        transform: translate(3px, 0);
        animation: glitch-bot 0.4s steps(2) forwards;
      }

      @keyframes glitch-top {
        0% {
          transform: translate(-3px, 0);
        }
        25% {
          transform: translate(3px, -2px);
        }
        50% {
          transform: translate(-2px, 1px);
        }
        75% {
          transform: translate(1px, 0);
        }
        100% {
          transform: translate(0, 0);
          opacity: 0;
        }
      }

      @keyframes glitch-bot {
        0% {
          transform: translate(3px, 0);
        }
        25% {
          transform: translate(-2px, 2px);
        }
        50% {
          transform: translate(3px, -1px);
        }
        75% {
          transform: translate(-1px, 0);
        }
        100% {
          transform: translate(0, 0);
          opacity: 0;
        }
      }

      /* Underline bar that animates in */
      .underbar {
        position: absolute;
        bottom: 6px;
        left: 0;
        height: 3px;
        background: var(--lime);
        width: 0;
        animation: grow-bar 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
        box-shadow: 0 0 12px var(--lime);
      }

      @keyframes grow-bar {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      /* Studios tag */
      .studios-tag {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 16px;
      }

      .tag-line {
        width: 32px;
        height: 1px;
        background: rgba(200, 255, 0, 0.35);
      }

      .studios-text {
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: #555;
      }

      /* Bottom data strip */
      .data-strip {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 32px;
        opacity: 0;
        animation: reveal 0.8s ease 1.4s forwards;
      }

      .data-item {
        font-family: "DM Sans", sans-serif;
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #2a2a2a;
      }

      .data-dot {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #2a2a2a;
      }

      /* SVG draw animations */
      .stroke-draw {
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: draw 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
      }

      .fill-in {
        opacity: 0;
        animation: fade-fill 0.4s ease 1s forwards;
      }

      @keyframes draw {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes fade-fill {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="glow-blob"></div>

    <div class="logo-wrap">
      <!-- Icon mark -->
      <div class="n-mark">
        <div class="orbit"></div>
        <div class="tick tick-tl"></div>
        <div class="tick tick-tr"></div>
        <div class="tick tick-bl"></div>
        <div class="tick tick-br"></div>

        <svg
          viewBox="0 0 220 220"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- Background circle -->
          <circle
            cx="110"
            cy="110"
            r="90"
            fill="#0f0f0f"
            stroke="#1c1c1c"
            stroke-width="1"
          />

          <!-- Subtle inner ring -->
          <circle cx="110" cy="110" r="72" stroke="#161616" stroke-width="1" />

          <!-- Left vertical bar of N -->
          <rect
            class="fill-in"
            x="68"
            y="62"
            width="22"
            height="96"
            rx="3"
            fill="#eeeade"
          />

          <!-- Right vertical bar of N -->
          <rect
            class="fill-in"
            x="130"
            y="62"
            width="22"
            height="96"
            rx="3"
            fill="#eeeade"
          />

          <!-- Diagonal slash of N — drawn stroke first, then filled -->
          <line
            class="stroke-draw"
            x1="90"
            y1="62"
            x2="130"
            y2="158"
            stroke="#c8ff00"
            stroke-width="18"
            stroke-linecap="round"
          />

          <!-- Lime dot accent top right -->
          <circle
            class="fill-in"
            cx="158"
            cy="58"
            r="5"
            fill="#c8ff00"
            opacity="0.9"
          />

          <!-- Small cross hair bottom left -->
          <g class="fill-in" opacity="0.3">
            <line
              x1="52"
              y1="162"
              x2="62"
              y2="162"
              stroke="#c8ff00"
              stroke-width="1"
            />
            <line
              x1="57"
              y1="157"
              x2="57"
              y2="167"
              stroke="#c8ff00"
              stroke-width="1"
            />
          </g>
        </svg>
      </div>

      <!-- Wordmark -->
      <div class="wordmark-row">
        <span class="word-novu">NOVU</span>
        <div class="underbar"></div>
      </div>

      <!-- Studios line -->
      <div class="studios-tag">
        <div class="tag-line"></div>
        <span class="studios-text">Studios</span>
        <div class="tag-line"></div>
      </div>
    </div>

    <!-- Bottom strip -->
    <div class="data-strip">
      <span class="data-item">Web Design</span>
      <div class="data-dot"></div>
      <span class="data-item">Digital Identity</span>
      <div class="data-dot"></div>
      <span class="data-item">Est. 2026</span>
    </div>
  </body>
</html>
